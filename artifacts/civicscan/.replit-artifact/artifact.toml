kind = "web"
previewPath = "/"
title = "CivicScan"
version = "1.0.0"
id = "artifacts/civicscan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18851

[services.development]
run = "pnpm --filter @workspace/civicscan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/civicscan", "run", "build" ]
publicDir = "artifacts/civicscan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18851"
BASE_PATH = "/"
